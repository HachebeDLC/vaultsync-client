name: vaultsync_launcher
description: Native launcher and sync bridge for VaultSync.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.vaultsync.launcher
        pluginClass: VaultSyncLauncherPlugin
