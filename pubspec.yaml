name: vaultsync_client
description: High-performance, hardware-encrypted emulator save synchronization.
publish_to: 'none'
version: 1.2.2+55

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  crypto: ^3.0.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  file_picker: ^10.3.10
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.10+1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_riverpod: ^2.5.1
  go_router: ^17.1.0
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  flutter_downloader: ^1.12.0
  sqflite: ^2.4.2
  path: ^1.9.1
  device_info_plus: ^12.3.0
  watcher: ^1.2.1
  pointycastle: 3.9.1
  mutex: ^3.1.0
  system_tray: ^2.0.2
  ffi: ^2.1.2

  vaultsync_launcher:
    path: local_plugins/vaultsync_launcher
  file_selector: ^1.1.0
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/vaultsync_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/systems/
    - assets/vaultsync_icon.png
    - assets/vaultsync_icon.ico
