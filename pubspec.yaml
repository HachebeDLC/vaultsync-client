name: vaultsync_client
description: High-performance, hardware-encrypted emulator save synchronization.
publish_to: 'none'
version: 1.3.7+65

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  crypto: ^3.0.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  file_picker: ^10.3.10
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.10+1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_riverpod: ^2.5.1
  go_router: ^17.1.0
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  flutter_downloader: ^1.12.0
  sqflite: ^2.4.2
  path: ^1.9.1
  device_info_plus: ^12.3.0
  package_info_plus: ^8.2.1
  uuid: ^3.0.7
  meta: ^1.15.0
  watcher: ^1.2.1
  pointycastle: 3.9.1
  mutex: ^3.1.0
  system_tray: ^2.0.2
  ffi: ^2.1.2

  vaultsync_launcher:
    path: local_plugins/vaultsync_launcher
  file_selector: ^1.1.0
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_client_sse: ^2.0.3
  url_launcher: ^6.2.5
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  linux:
    generate: true
    image_path: "assets/vaultsync_icon.png"
  windows:
    generate: true
    image_path: "assets/vaultsync_icon.png"
  image_path: "assets/vaultsync_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/vaultsync_icon.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/systems/
    - assets/vaultsync_icon.png
    - assets/vaultsync_icon.ico
    - assets/config/path_config.json

dependency_overrides:
  flutter_secure_storage_linux:
    path: local_plugins/dummy_secure_storage_linux
