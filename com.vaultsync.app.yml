app-id: com.vaultsync.app
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: vaultsync-launch

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  # Emulator saves can live anywhere under home — required for EmuDeck,
  # RetroArch, standalone emulators, etc.
  - --filesystem=home
  - --filesystem=~/.var/app
  - --filesystem=/run/media
  # Tray icon support (KDE/Plasma StatusNotifier + legacy AppIndicator)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.Flatpak

modules:

  # ── libdbusmenu + full Canonical dep chain (from flathub/shared-modules) ──
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  # ── ayatana-ido: widget set used by libayatana-indicator ─────────────────
  - name: ayatana-ido
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_TESTS=NO
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-ido/archive/refs/tags/0.10.1.tar.gz
        sha256: 26187915a6f3402195e2c78d9e8a54549112a3cd05bb2fbe2059d3e78fc0e071
      - type: shell
        commands:
          - sed -i 's/if (INTROSPECTION_FOUND)/if (FALSE)/' src/CMakeLists.txt

  # ── libayatana-indicator ──────────────────────────────────────────────────
  - name: libayatana-indicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_TESTS=NO
      - -DENABLE_IDO=NO
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.3.tar.gz
        sha256: 09c5456fcb430b6ee0626fafdf99a32eb8746b267d56ab2bd4c8a8dd6ca731da
      - type: shell
        commands:
          - sed -i 's/if (INTROSPECTION_FOUND)/if (FALSE)/' src/CMakeLists.txt || true

  # ── libayatana-appindicator: the exact soname system_tray links against ───
  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
      - -DENABLE_TESTS=NO
      - -DENABLE_IDO=NO
      - -DENABLE_GTKDOC=NO
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/girepository-1.0
      - /share/gir-1.0
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.93.tar.gz
        sha256: cbefed7a918a227bf71286246e237fcd3a9c8499b3eaac4897811a869409edf0
      - type: shell
        commands:
          - sed -i 's/if (INTROSPECTION_FOUND)/if (FALSE)/' src/CMakeLists.txt || true

  # ── VaultSync Flutter bundle ──────────────────────────────────────────────
  - name: vaultsync
    buildsystem: simple

    sources:
      # Pre-built Flutter bundle (built before flatpak-builder runs in CI)
      - type: dir
        path: build/linux/x64/release/bundle

      - type: file
        path: linux/vaultsync_bridge.py

      - type: file
        path: linux/install_autostart.sh

      - type: file
        path: linux/install_shortcut.sh

      - type: file
        path: linux/vaultsync-launch

      - type: file
        path: linux/com.vaultsync.app.desktop

      - type: file
        path: linux/com.vaultsync.app.metainfo.xml

    build-commands:
      # Install Flutter bundle. Exclude pre-built ayatana/dbusmenu libs —
      # the Flatpak-built ones in /app/lib/ are used instead via LD_LIBRARY_PATH.
      - mkdir -p /app/lib/vaultsync/lib
      - install -Dm755 VaultSync /app/lib/vaultsync/VaultSync
      - cp -r data /app/lib/vaultsync/data
      - find lib -maxdepth 1 -name '*.so*'
          ! -name 'libayatana-*'
          ! -name 'libdbusmenu-*'
          -exec cp {} /app/lib/vaultsync/lib/ \;

      # Bridge daemon and installer scripts land next to the binary so that
      # Platform.resolvedExecutable-based path resolution finds them at
      # runtime ($exeDir/vaultsync_bridge.py).
      - install -Dm755 vaultsync_bridge.py   /app/lib/vaultsync/vaultsync_bridge.py
      - install -Dm755 install_autostart.sh  /app/lib/vaultsync/install_autostart.sh
      - install -Dm755 install_shortcut.sh   /app/lib/vaultsync/install_shortcut.sh

      # Launcher wrapper: puts /app/lib on LD_LIBRARY_PATH so Flatpak-built
      # ayatana libs are found before the excluded pre-built ones.
      - install -Dm755 vaultsync-launch /app/bin/vaultsync-launch

      # Desktop integration
      - install -Dm644 com.vaultsync.app.desktop /app/share/applications/com.vaultsync.app.desktop
      - install -Dm644 com.vaultsync.app.metainfo.xml /app/share/metainfo/com.vaultsync.app.metainfo.xml
      - install -Dm644 data/flutter_assets/assets/vaultsync_icon.png /app/share/icons/hicolor/256x256/apps/com.vaultsync.app.png

      # Install pre-built Decky plugin (built by CI before flatpak-builder runs,
      # copied into the bundle by the "Prepare Linux bundle" step).
      - cp -r decky_plugin /app/lib/vaultsync/decky_plugin
