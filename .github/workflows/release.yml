name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [Android, Windows, Linux]
        include:
          - target: Android
            os: ubuntu-latest
          - target: Windows
            os: windows-latest
          - target: Linux
            os: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.target == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies (Linux)
        if: matrix.target == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libayatana-appindicator3-dev clang cmake ninja-build pkg-config libgtk-3-dev patchelf libsqlite3-dev

      - name: Set up Node + pnpm (Linux — Decky plugin)
        if: matrix.target == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm (Linux — Decky plugin)
        if: matrix.target == 'Linux'
        run: npm install -g pnpm

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        if: matrix.target == 'Android'
        run: flutter build apk --release --no-shrink

      - name: Build Windows
        if: matrix.target == 'Windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.target == 'Linux'
        run: flutter build linux --release

      - name: Zip Artifacts (Windows)
        if: matrix.target == 'Windows'
        shell: pwsh
        run: |
          cd build\windows\x64\runner\Release
          7z a ..\..\..\..\..\VaultSync-Windows.zip *

      - name: Build Decky plugin (Linux)
        if: matrix.target == 'Linux'
        run: |
          cd decky
          pnpm install --frozen-lockfile
          pnpm build

      - name: Zip Artifacts (Linux)
        if: matrix.target == 'Linux'
        run: |
          BUNDLE=build/linux/x64/release/bundle

          # Bundle dynamically linked libraries for portability
          cp /usr/lib/x86_64-linux-gnu/libayatana-appindicator3.so.1 $BUNDLE/lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libayatana-indicator3.so.7 $BUNDLE/lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libayatana-ido3-0.4.so.0 $BUNDLE/lib/ || true
          # Patch all shared libraries to look in $ORIGIN for dependencies
          for f in $BUNDLE/lib/*.so*; do
            patchelf --set-rpath '$ORIGIN' "$f" || true
          done

          # Bundle Decky plugin
          mkdir -p $BUNDLE/decky_plugin/dist $BUNDLE/decky_plugin/assets
          cp decky/dist/index.js  $BUNDLE/decky_plugin/dist/
          cp decky/plugin.json     $BUNDLE/decky_plugin/
          cp decky/main.py         $BUNDLE/decky_plugin/
          cp decky/package.json    $BUNDLE/decky_plugin/
          cp -r decky/assets/.     $BUNDLE/decky_plugin/assets/

          zip -r VaultSync-Linux.zip $BUNDLE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            VaultSync-Windows.zip
            VaultSync-Linux.zip
          body: "VaultSync Release ${{ github.ref_name }} (Cross-Platform)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
