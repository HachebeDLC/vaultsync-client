name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [Android, Windows, Linux]
        include:
          - target: Android
            os: ubuntu-latest
          - target: Windows
            os: windows-latest
          - target: Linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.target == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies (Linux)
        if: matrix.target == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libayatana-appindicator3-dev clang cmake ninja-build pkg-config libgtk-3-dev patchelf

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        if: matrix.target == 'Android'
        run: flutter build apk --release --no-shrink

      - name: Build Windows
        if: matrix.target == 'Windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.target == 'Linux'
        run: flutter build linux --release

      - name: Zip Artifacts (Windows)
        if: matrix.target == 'Windows'
        shell: pwsh
        run: |
          cd build\windows\x64\runner\Release
          7z a ..\..\..\..\..\VaultSync-Windows.zip *

      - name: Zip Artifacts (Linux)
        if: matrix.target == 'Linux'
        run: |
          cd build/linux/x64/release/bundle
          # Bundle dynamically linked libraries for portability
          cp /usr/lib/x86_64-linux-gnu/libayatana-appindicator3.so.1 lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libayatana-indicator3.so.7 lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libayatana-ido3-0.4.so.0 lib/ || true
          # Patch all shared libraries to look in $ORIGIN (their own directory) for dependencies
          for f in lib/*.so*; do
            patchelf --set-rpath '$ORIGIN' "$f" || true
          done
          zip -r ../../../../../VaultSync-Linux.zip *

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            VaultSync-Windows.zip
            VaultSync-Linux.zip
          body: "VaultSync Release ${{ github.ref_name }} (Cross-Platform)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
